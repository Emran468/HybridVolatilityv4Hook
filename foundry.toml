[profile.default]
auto_detect_solc = true
offline = false
evm_version = "cancun"
ffi = true
fs_permissions = [{access = "read-write", path = ".forge-snapshots/"}]
libs = ["lib"]
out = "out"
solc = "0.8.26"
src = "src"
via_ir = true
optimizer = true
optimizer_runs = 1000000

[profile.default.optimizer_details]
yul = true
yulDetails = { stackAllocation = true }

[lint]
exclude_lints = ["screaming-snake-case-immutable", "screaming-snake-case-const"]
lint_on_build = false

[profile.default.invariant]
runs = 256
depth = 25
fail_on_revert = true

# ── RPC endpoints ──────────────────────────────────────────────────────────
[rpc_endpoints]
unichain          = "${UNICHAIN_RPC}"
unichain_sepolia  = "${UNICHAIN_SEPOLIA_RPC}"
ethereum          = "${ETHEREUM_RPC}"
base              = "${BASE_RPC}"
sepolia           = "${SEPOLIA_RPC}"

# ── Etherscan/Explorer API keys ────────────────────────────────────────────
[etherscan]
unichain         = { key = "${UNISCAN_API_KEY}",     url = "https://api.uniscan.xyz/api"                  }
unichain_sepolia = { key = "${UNISCAN_API_KEY}",     url = "https://api-sepolia.uniscan.xyz/api", chain = 1301 }
base             = { key = "${BASESCAN_API_KEY}",    url = "https://api.basescan.org/api"                 }
sepolia          = { key = "${ETHERSCAN_API_KEY}",   url = "https://api-sepolia.etherscan.io/api"         }